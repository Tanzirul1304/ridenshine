databases:
  - name: ridenshine-db
    plan: free
    databaseName: ridenshine
    user: ridenshine

services:
  - type: web
    name: ridenshine-platform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ridenshine-db
          property: connectionString
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://ridenshine-platform.onrender.com
