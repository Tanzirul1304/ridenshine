spring.application.name=ridenshine-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ridenshine}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ridenshine}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ridenshine}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
server.port=${PORT:8080}
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:ChangeMe123!}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=RideNShine
info.app.description=Motorcycle parts, service booking and workshop management platform
logging.level.com.ridenshine=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n
